<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="/favicon_white.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- DNS 预连接 -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
  
  <!-- 预连接到关键服务 -->
  <link rel="preconnect" href="//fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="//fonts.gstatic.com" crossorigin>

  <!-- 预加载关键资源 -->
  <link rel="preload" href="/favicon_white.webp" as="image" type="image/webp" />
  <link rel="preload" href="/logo_whitelong.webp" as="image" type="image/webp" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/favicon_white.webp" />

  <title>Orderly Network</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/app/main.tsx"></script>
</body>

</html>
